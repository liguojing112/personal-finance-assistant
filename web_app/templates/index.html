{% extends "base.html" %}
{% block title %}上传账单 - 财务小助手{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">📤 上传微信/支付宝账单</h3>
            </div>
            <div class="card-body">
                <p class="text-muted">请选择从微信或支付宝导出的账单文件（支持同时选择多个 .xlsx 或 .csv 文件）</p>
                <form action="/upload" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="files" class="form-label">选择文件</label>
                        <input class="form-control" type="file" name="files" id="files" accept=".xlsx,.csv" multiple required>
                    </div>
                    <button type="submit" class="btn btn-success">上传并分析</button>
                </form>
            </div>
            <div class="card-footer text-muted">
                账单导出：微信【我 → 服务 → 钱包 → 账单 → 下载】；支付宝【我的 → 账单 → 开具交易流水证明】
            </div>
        </div>
    </div>
</div>
{% endblock %}
